<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>llml Profile Catalog — UI kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    body { margin: 0; }
    [data-screen-label] { /* anchors */ }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="UI.jsx"></script>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Home.jsx"></script>
  <script type="text/babel" src="Browse.jsx"></script>
  <script type="text/babel" src="ProfileDetail.jsx"></script>
  <script type="text/babel" src="Contribute.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [route, setRoute] = useState("home");
      const [profileId, setProfileId] = useState(null);
      const openProfile = (id) => { setProfileId(id); setRoute("detail"); };

      let screenLabel = "01 Home";
      if (route === "browse") screenLabel = "02 Browse";
      else if (route === "detail") screenLabel = "03 Profile detail";
      else if (route === "contribute" || route === "how") screenLabel = "04 Contribute";

      return (
        <div data-screen-label={screenLabel}>
          <Nav route={route} setRoute={setRoute} />
          {route === "home" && <Home setRoute={setRoute} openProfile={openProfile} />}
          {route === "browse" && <Browse openProfile={openProfile} />}
          {route === "detail" && <ProfileDetail id={profileId || PROFILES[0].id} openProfile={openProfile} setRoute={setRoute} />}
          {(route === "contribute" || route === "how") && <Contribute />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
