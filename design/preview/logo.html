<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div style="display:flex;flex-direction:column;gap:24px">

  <!-- Primary lockup -->
  <div>
    <div style="display:flex;align-items:baseline;gap:14px">
      <div style="font-family:'Instrument Serif',serif;font-size:56px;line-height:1;letter-spacing:-0.02em;color:#111318">LLM Launcher</div>
    </div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8A8375;margin-top:8px;letter-spacing:0.04em;text-transform:uppercase">Primary wordmark · Instrument Serif</div>
  </div>

  <!-- Lockup with command tag -->
  <div style="padding-top:18px;border-top:1px solid #D8D2C4">
    <div style="display:flex;align-items:baseline;gap:14px">
      <div style="font-family:'Instrument Serif',serif;font-size:40px;line-height:1;letter-spacing:-0.02em;color:#111318">LLM Launcher</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:#5A5346;background:#EFEAD8;padding:4px 8px;border-radius:4px">llml</div>
    </div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8A8375;margin-top:8px;letter-spacing:0.04em;text-transform:uppercase">Lockup with command tag</div>
  </div>

  <!-- On dark -->
  <div style="padding-top:18px;border-top:1px solid #D8D2C4">
    <div style="background:#111318;padding:24px;border-radius:6px;display:flex;align-items:baseline;gap:14px">
      <div style="font-family:'Instrument Serif',serif;font-size:40px;line-height:1;letter-spacing:-0.02em;color:#F5F1E4">LLM Launcher</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:#B8B0A0;background:rgba(245,241,228,0.08);padding:4px 8px;border-radius:4px">llml</div>
    </div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8A8375;margin-top:8px;letter-spacing:0.04em;text-transform:uppercase">On dark surface</div>
  </div>

  <!-- Compact / favicon -->
  <div style="padding-top:18px;border-top:1px solid #D8D2C4;display:flex;gap:24px;align-items:center">
    <div style="width:56px;height:56px;background:#111318;border-radius:10px;display:flex;align-items:center;justify-content:center">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:22px;color:#F5F1E4;font-weight:500">ll</span>
    </div>
    <div style="width:56px;height:56px;background:#2F6BFF;border-radius:10px;display:flex;align-items:center;justify-content:center">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:22px;color:#fff;font-weight:500">ll</span>
    </div>
    <div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8A8375;letter-spacing:0.04em;text-transform:uppercase">Favicon / app icon</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#5A5346;margin-top:4px">llml monogram, mono weight 500</div>
    </div>
  </div>

</div>
</body></html>
