<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div style="display:flex;flex-direction:column;gap:10px;font-family:var(--font-sans);font-size:14px">
  <div style="display:flex;gap:10px;align-items:center">
    <button style="font:inherit;background:#2F6BFF;color:#fff;border:1px solid #2F6BFF;padding:8px 14px;border-radius:8px;cursor:pointer">Import profile</button>
    <button style="font:inherit;background:transparent;color:#111318;border:1px solid #D8D2C4;padding:8px 14px;border-radius:8px;cursor:pointer">Browse profiles</button>
    <button style="font:inherit;background:transparent;color:#111318;border:0;padding:8px 10px;border-radius:8px;cursor:pointer;text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:3px">Learn how</button>
    <button style="font:inherit;background:transparent;color:#8A8375;border:1px solid #D8D2C4;padding:8px 14px;border-radius:8px" disabled>Disabled</button>
  </div>
  <div style="font-family:var(--font-mono);font-size:11px;color:#8A8375;letter-spacing:.08em;text-transform:uppercase">Primary · Secondary · Ghost · Disabled</div>
</div>
</body></html>
