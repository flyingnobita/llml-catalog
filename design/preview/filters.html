<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div style="display:flex;flex-direction:column;gap:10px;font-family:var(--font-sans);font-size:13px">
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <span style="border:1px solid #D8D2C4;background:transparent;color:#111318;padding:6px 12px;border-radius:9999px">All backends</span>
    <span style="border:1px solid #111318;background:#111318;color:#F3F1EA;padding:6px 12px;border-radius:9999px">llama.cpp ✕</span>
    <span style="border:1px solid #D8D2C4;background:transparent;color:#111318;padding:6px 12px;border-radius:9999px">vLLM</span>
    <span style="border:1px solid #D8D2C4;background:#E7E1D4;color:#111318;padding:6px 12px;border-radius:9999px">Hovered</span>
    <span style="border:1px dashed #D8D2C4;background:transparent;color:#8A8375;padding:6px 12px;border-radius:9999px">Disabled</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <input placeholder="Search profiles, models, hardware…" style="font:inherit;flex:1;padding:8px 12px;border:1px solid #D8D2C4;border-radius:8px;background:#fff" />
    <select style="font:inherit;padding:8px 12px;border:1px solid #D8D2C4;border-radius:8px;background:#fff"><option>Sort: Updated</option><option>Sort: Fit</option></select>
  </div>
  <div style="font-family:var(--font-mono);font-size:11px;color:#8A8375;letter-spacing:.08em;text-transform:uppercase">filter chips · search · sort</div>
</div>
</body></html>
