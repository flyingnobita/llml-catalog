<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>llml Project Roadmap — Split View</title>
    <link rel="stylesheet" href="design/colors_and_type.css">
    <style>
        body {
            max-width: var(--w-app);
            margin: 0 auto;
            padding: var(--s-lg) var(--s-md);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid var(--border);
            padding-bottom: var(--s-md);
            margin-bottom: var(--s-lg);
        }

        .header-title-area {
            display: flex;
            flex-direction: column;
            gap: var(--s-2xs);
        }

        .controls {
            margin-bottom: var(--s-xl);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: var(--s-md);
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 250px;
            max-width: 400px;
        }

        .search-wrapper input {
            width: 100%;
            box-sizing: border-box;
            background: var(--surface-raised);
            border: 1px solid var(--border);
            color: var(--ink);
            padding: 10px 12px 10px 38px;
            border-radius: var(--r-md);
            font-family: var(--font-sans);
            font-size: var(--text-sm);
            transition: border-color var(--d-short) var(--ease-move);
        }

        .search-wrapper input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }

        .filter-controls {
            display: flex;
            align-items: center;
            gap: var(--s-md);
        }

        select {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            color: var(--ink);
            padding: 8px 12px;
            border-radius: var(--r-md);
            font-family: var(--font-sans);
            font-size: var(--text-sm);
            cursor: pointer;
        }

        /* Split Board Layout */
        .board-split {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--s-lg);
        }

        @media (min-width: 900px) {
            .board-split {
                grid-template-columns: 1fr 1fr;
                gap: var(--s-xl);
            }
        }

        .project-board-column {
            display: flex;
            flex-direction: column;
            gap: var(--s-lg);
            background: var(--paper-2);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: var(--s-md);
        }

        .project-board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: var(--s-md);
            margin-bottom: var(--s-2xs);
        }

        .project-title {
            display: flex;
            align-items: center;
            gap: var(--s-xs);
        }

        .project-title h2 {
            font-size: var(--text-xl);
            font-weight: 700;
            font-family: var(--font-sans);
            margin: 0;
        }

        .project-mini-stats {
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            color: var(--muted);
            display: flex;
            gap: var(--s-xs);
        }

        .mini-stat-item {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            padding: 2px 6px;
            border-radius: var(--r-sm);
        }

        .status-swimlane {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: var(--s-md);
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            gap: var(--s-xs);
        }

        .status-swimlane-header {
            font-family: var(--font-serif);
            font-size: var(--text-lg);
            border-bottom: 1px solid var(--border);
            padding-bottom: var(--s-2xs);
            margin: 0 0 var(--s-xs) 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-swimlane-count {
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            color: var(--muted);
            background: var(--paper-2);
            padding: 1px 6px;
            border-radius: var(--r-full);
        }

        .priority-subgroup {
            display: flex;
            flex-direction: column;
            gap: var(--s-2xs);
            margin-bottom: var(--s-xs);
        }

        .priority-subgroup-header {
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: var(--s-2xs);
            font-weight: 600;
        }

        .priority-subgroup-header::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
            opacity: 0.4;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: var(--s-xs);
        }

        .task-card {
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            padding: var(--s-sm);
            cursor: pointer;
            transition: all var(--d-short) var(--ease-move);
            display: flex;
            flex-direction: column;
            gap: var(--s-2xs);
        }

        .task-card:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-float);
            border-color: var(--primary);
            background: var(--surface-raised);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-id {
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            color: var(--muted);
        }

        .priority-badge {
            font-size: 10px;
            padding: 1px 4px;
            border-radius: var(--r-sm);
            font-weight: 700;
            text-transform: uppercase;
            font-family: var(--font-mono);
        }

        .p1 { background: var(--error); color: white; }
        .p2 { background: var(--warning); color: var(--ink); }
        .p3 { background: var(--primary); color: white; }
        .done { background: var(--success); color: white; }

        .task-title {
            font-weight: 600;
            font-size: var(--text-sm);
            color: var(--ink);
            line-height: var(--leading-snug);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal {
            background: var(--surface-raised);
            max-width: 600px;
            width: 90%;
            border-radius: var(--r-lg);
            padding: var(--s-lg);
            box-shadow: var(--shadow-float);
            border: 1px solid var(--border);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: var(--s-md);
            right: var(--s-md);
            cursor: pointer;
            color: var(--muted);
        }

        .modal-close:hover {
            color: var(--ink);
        }

        .modal h2 {
            margin-bottom: var(--s-md);
        }

        .modal-meta {
            display: flex;
            flex-wrap: wrap;
            gap: var(--s-sm);
            margin-bottom: var(--s-md);
            padding-bottom: var(--s-md);
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .modal-scope {
            white-space: pre-wrap;
            font-family: var(--font-sans);
            background: var(--paper);
            padding: var(--s-md);
            border-radius: var(--r-md);
            border: 1px solid var(--border);
            margin-top: var(--s-xs);
        }

        .theme-toggle {
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            background: var(--paper-2);
            border: 1px solid var(--border);
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--d-short) var(--ease-move);
        }

        .theme-toggle:hover {
            background: var(--border);
        }

        .icon-inline {
            width: 14px;
            height: 14px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title-area">
            <div class="eyebrow">Project Status Dashboard</div>
            <h1>llml Roadmap</h1>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
            <i data-lucide="sun" id="theme-icon-light" style="display:none;"></i>
            <i data-lucide="moon" id="theme-icon-dark"></i>
        </button>
    </header>

    <div class="controls">
        <div class="search-wrapper">
            <i data-lucide="search" class="search-icon" style="width: 18px; height: 18px;"></i>
            <input type="text" id="search" placeholder="Search tasks..." oninput="renderTasks()">
        </div>
        
        <div class="filter-controls">
            <!-- Status Dropdown Filter -->
            <select id="filter-status" onchange="renderTasks()">
                <option value="all">All Statuses</option>
                <option value="in-progress">In Progress</option>
                <option value="up-next">Up Next</option>
                <option value="completed">Completed</option>
            </select>
        </div>
    </div>

    <!-- Dual Column Split Layout -->
    <main class="board-split">
        
        <!-- Column 1: llml launcher -->
        <section class="project-board-column" id="board-llml">
            <div class="project-board-header">
                <div class="project-title">
                    <i data-lucide="terminal" style="color: var(--primary);"></i>
                    <h2>llml</h2>
                </div>
                <div class="project-mini-stats" id="stats-llml">
                    <!-- Mini stats injected here -->
                </div>
            </div>
            <div class="swimlanes-container" id="swimlanes-llml">
                <!-- Status swimlanes injected here -->
            </div>
        </section>

        <!-- Column 2: llml-catalog site -->
        <section class="project-board-column" id="board-catalog">
            <div class="project-board-header">
                <div class="project-title">
                    <i data-lucide="book-open" style="color: var(--primary);"></i>
                    <h2>llml-catalog</h2>
                </div>
                <div class="project-mini-stats" id="stats-catalog">
                    <!-- Mini stats injected here -->
                </div>
            </div>
            <div class="swimlanes-container" id="swimlanes-catalog">
                <!-- Status swimlanes injected here -->
            </div>
        </section>

    </main>

    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" id="modal" onclick="event.stopPropagation()">
            <div class="modal-close" onclick="closeModal()">
                <i data-lucide="x" style="width: 20px; height: 20px;"></i>
            </div>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.439.0/dist/umd/lucide.min.js"></script>
    <script>
        const tasks = [
            // In Progress
            { id: 4, repo: 'llml', title: 'Interactive profile configuration', priority: 'P2', status: 'in-progress', scope: 'Prompt for missing configuration elements during startup rather than using defaults' },
            // Up Next P2
            { id: 5, repo: 'llml-catalog', title: '/how page', priority: 'P2', status: 'up-next', scope: 'Page doesn\'t exist (404); nav bar and home CTA link to it' },
            { id: 6, repo: 'llml-catalog', title: 'ImportModal on profile detail', priority: 'P2', status: 'up-next', scope: '"Open import wizard" button + 3-step flow from design prototype' },
            { id: 7, repo: 'llml-catalog', title: 'Mobile responsive styles', priority: 'P2', status: 'up-next', scope: '4-col mobile, 8-col tablet breakpoints; currently none' },
            { id: 8, repo: 'llml-catalog', title: 'Keyboard shortcuts', priority: 'P2', status: 'up-next', scope: 'j/k row nav, x compare, g b/g h page jump, ? overlay' },
            { id: 9, repo: 'llml-catalog', title: 'Compare page arg/env formatting', priority: 'P2', status: 'up-next', scope: 'Multi-line with highlighted env values; currently comma-separated' },
            { id: 10, repo: 'llml-catalog', title: 'Browse loading/error states', priority: 'P2', status: 'up-next', scope: 'Skeleton loading + error UI for browse page' },
            { id: 12, repo: 'llml', title: 'golangci-lint', priority: 'P2', status: 'up-next', scope: 'Add staticcheck + unused linters for dead code detection' },
            { id: 13, repo: 'llml', title: 'Missing-runtime warnings', priority: 'P2', status: 'up-next', scope: 'Warn when no supported runtime is detected' },
            { id: 14, repo: 'llml', title: 'Missing-model warnings', priority: 'P2', status: 'up-next', scope: 'Warn when no models are detected' },
            { id: 15, repo: 'llml', title: 'Profile-level runtime overrides', priority: 'P2', status: 'up-next', scope: 'Allow profiles to carry optional runtime-specific overrides' },
            { id: 16, repo: 'llml', title: 'Debug/introspection surface', priority: 'P2', status: 'up-next', scope: 'Expand LLML_DEBUG into reusable discovery-debug UI' },
            { id: 17, repo: 'llml', title: 'CLI for profiles', priority: 'P2', status: 'up-next', scope: 'Run servers with parameter profiles without entering TUI' },
            // Up Next P3
            { id: 18, repo: 'llml-catalog', title: 'Button component fix', priority: 'P3', status: 'up-next', scope: 'ContributeCTA uses !important hacks; fix Button style prop passthrough' },
            { id: 19, repo: 'llml-catalog', title: 'Compare tray animation', priority: 'P3', status: 'up-next', scope: 'opacity + translateY reveal using --d-short and --ease-enter' },
            { id: 20, repo: 'llml-catalog', title: 'Community contribution guide', priority: 'P3', status: 'up-next', scope: 'Fill docs/ with how to submit a profile PR' },
            { id: 21, repo: 'llml-catalog', title: 'Search and filter', priority: 'P3', status: 'up-next', scope: 'Client-side search + faceted browsing (Pagefind or Fuse.js); post-MVP' },
            { id: 22, repo: 'llml', title: 'Windows WSL support', priority: 'P3', status: 'up-next', scope: 'Platform expansion' },
            { id: 23, repo: 'llml', title: 'MLX / mlx-lm integration', priority: 'P3', status: 'up-next', scope: 'Apple Silicon-focused runtime expansion' },
            { id: 24, repo: 'llml', title: 'LM Studio integration', priority: 'P3', status: 'up-next', scope: 'Ecosystem expansion for LM Studio users' },
            { id: 25, repo: 'llml', title: 'Multi-skill sync tooling', priority: 'P3', status: 'up-next', scope: 'Extend scripts/sync-skill beyond single-skill default' },
            { id: 26, repo: 'llml', title: 'LocalAI integration', priority: 'P3', status: 'up-next', scope: 'Infrastructure-oriented backend expansion' },
            { id: 27, repo: 'llml-catalog', title: 'Containerize Playwright scraper', priority: 'P3', status: 'up-next', scope: 'Use mcr.microsoft.com/playwright/python Docker image to isolate dependencies' },
            // Completed
            { id: 'C1', repo: 'llml-catalog', title: 'Dark mode + theme toggle', priority: 'Done', status: 'completed', scope: 'Completed on 2026-05-08' },
            { id: 'C2', repo: 'llml', title: 'Profile export', priority: 'Done', status: 'completed', scope: 'Completed on 2026-05-11' },
            { id: 'C3', repo: 'llml-catalog', title: 'Scraping pipeline + 63 profiles', priority: 'Done', status: 'completed', scope: 'Completed on 2026-05-11' },
            { id: 'C12', repo: 'llml', title: 'v0.5.0 release', priority: 'Done', status: 'completed', scope: 'Completed on 2026-05-13' },
            { id: 'C13', repo: 'llml-catalog', title: 'InstallBlock component', priority: 'Done', status: 'completed', scope: 'Completed on 2026-05-14' }
        ];

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const lightIcon = document.getElementById('theme-icon-light');
            const darkIcon = document.getElementById('theme-icon-dark');
            if (theme === 'dark') {
                lightIcon.style.display = 'block';
                darkIcon.style.display = 'none';
            } else {
                lightIcon.style.display = 'none';
                darkIcon.style.display = 'block';
            }
        }

        function renderStats() {
            ['llml', 'llml-catalog'].forEach(repo => {
                const filtered = tasks.filter(t => t.repo === repo);
                const completed = filtered.filter(t => t.status === 'completed').length;
                const inProgress = filtered.filter(t => t.status === 'in-progress').length;
                const upNext = filtered.filter(t => t.status === 'up-next').length;
                
                const statsContainer = document.getElementById(`stats-${repo === 'llml' ? 'llml' : 'catalog'}`);
                statsContainer.innerHTML = `
                    <span class="mini-stat-item" style="color: var(--success);">${completed} done</span>
                    <span class="mini-stat-item" style="color: var(--primary);">${inProgress} active</span>
                    <span class="mini-stat-item" style="color: var(--warning);">${upNext} next</span>
                `;
            });
        }

        function renderTasks() {
            renderStats();

            const searchTerm = document.getElementById('search').value.toLowerCase();
            const statusFilter = document.getElementById('filter-status').value;

            const filterAndGroup = (repoName) => {
                const filtered = tasks.filter(t => {
                    const matchesSearch = t.title.toLowerCase().includes(searchTerm) || t.scope.toLowerCase().includes(searchTerm);
                    const matchesRepo = t.repo === repoName;
                    const matchesStatus = statusFilter === 'all' || t.status === statusFilter;
                    return matchesSearch && matchesRepo && matchesStatus;
                });

                const groups = {
                    'in-progress': { label: 'In Progress', tasks: [] },
                    'up-next': { label: 'Up Next', tasks: [] },
                    'completed': { label: 'Completed', tasks: [] }
                };

                filtered.forEach(t => {
                    if (groups[t.status]) groups[t.status].tasks.push(t);
                });

                return groups;
            };

            const renderRepoColumn = (repoName, containerId) => {
                const groups = filterAndGroup(repoName);
                const container = document.getElementById(containerId);

                let hasAnyTasks = false;
                const htmlContent = Object.entries(groups).map(([statusId, group]) => {
                    if (group.tasks.length === 0) return '';
                    hasAnyTasks = true;

                    const priorityOrder = ['P1', 'P2', 'P3', 'Done'];
                    const priorityGroups = {};
                    group.tasks.forEach(t => {
                        if (!priorityGroups[t.priority]) priorityGroups[t.priority] = [];
                        priorityGroups[t.priority].push(t);
                    });

                    const sortedPriorities = Object.keys(priorityGroups).sort((a, b) => {
                        return priorityOrder.indexOf(a) - priorityOrder.indexOf(b);
                    });

                    return `
                        <div class="status-swimlane">
                            <h3 class="status-swimlane-header">
                                ${group.label}
                                <span class="status-swimlane-count">${group.tasks.length}</span>
                            </h3>
                            <div class="swimlane-content">
                                ${sortedPriorities.map(p => `
                                    <div class="priority-subgroup">
                                        <div class="priority-subgroup-header">${p}</div>
                                        <div class="task-list">
                                            ${priorityGroups[p].map(t => `
                                                <div class="task-card" onclick="openModal('${t.id}')">
                                                    <div class="task-header">
                                                        <span class="task-id">#${t.id}</span>
                                                        <span class="priority-badge ${t.priority.toLowerCase()}">${t.priority}</span>
                                                    </div>
                                                    <div class="task-title">${t.title}</div>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }).join('');

                container.innerHTML = hasAnyTasks ? htmlContent : `<div style="text-align: center; color: var(--muted); padding: var(--s-lg); background: var(--surface-raised); border-radius: var(--r-md); border: 1px dashed var(--border);">No matching tasks.</div>`;
            };

            renderRepoColumn('llml', 'swimlanes-llml');
            renderRepoColumn('llml-catalog', 'swimlanes-catalog');

            if (window.lucide) {
                lucide.createIcons();
            }
        }

        function openModal(id) {
            const task = tasks.find(t => t.id == id);
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h2 style="font-family: var(--font-serif); font-size: var(--text-2xl); font-weight: 400; margin: 0 0 var(--s-sm) 0;">
                    ${task.title}
                </h2>
                <div class="modal-meta">
                    <span class="priority-badge ${task.priority.toLowerCase()}">${task.priority}</span>
                    <span class="task-repo">
                        <i data-lucide="${task.repo === 'llml' ? 'terminal' : 'book-open'}" class="icon-inline"></i>
                        ${task.repo}
                    </span>
                    <span class="task-status" style="font-family: var(--font-mono); font-size: var(--text-xs); color: var(--muted);">
                        ${task.status.replace('-', ' ')}
                    </span>
                </div>
                <div class="modal-scope">
                    <div class="eyebrow" style="margin-bottom: var(--s-2xs);">Scope & Details</div>
                    <div style="color: var(--ink); line-height: var(--leading-body); font-size: var(--text-sm); font-family: var(--font-mono);">
                        ${task.scope}
                    </div>
                </div>
            `;
            document.getElementById('modal-overlay').style.display = 'flex';
            if (window.lucide) {
                lucide.createIcons();
            }
        }

        function closeModal(e) {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        // Initialize
        renderTasks();
        
        // Check system preference
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
            updateThemeIcon('dark');
        }
        
        if (window.lucide) {
            lucide.createIcons();
        }
    </script>
</body>
</html>
