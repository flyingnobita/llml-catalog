<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>llml Project Roadmap — Dashboard</title>
    <link rel="stylesheet" href="design/colors_and_type.css">
    <style>
        body {
            max-width: var(--w-app);
            margin: 0 auto;
            padding: var(--s-lg) var(--s-md);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid var(--border);
            padding-bottom: var(--s-md);
            margin-bottom: var(--s-lg);
            flex-wrap: wrap;
            gap: var(--s-md);
        }

        .header-title-area {
            display: flex;
            flex-direction: column;
            gap: var(--s-2xs);
        }

        /* View Selector tabs */
        .view-selector {
            background: var(--paper-2);
            padding: 4px;
            border-radius: var(--r-md);
            display: inline-flex;
            border: 1px solid var(--border);
            gap: 4px;
        }

        .view-tab {
            background: transparent;
            border: none;
            color: var(--muted);
            padding: 8px 16px;
            border-radius: calc(var(--r-md) - 2px);
            font-family: var(--font-sans);
            font-size: var(--text-sm);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: var(--s-2xs);
            transition: all var(--d-short) var(--ease-move);
        }

        .view-tab:hover {
            color: var(--ink);
        }

        .view-tab.active {
            background: var(--surface-raised);
            color: var(--primary);
            box-shadow: var(--shadow-card);
        }

        .controls {
            margin-bottom: var(--s-xl);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: var(--s-md);
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 250px;
            max-width: 400px;
        }

        .search-wrapper input {
            width: 100%;
            box-sizing: border-box;
            background: var(--surface-raised);
            border: 1px solid var(--border);
            color: var(--ink);
            padding: 10px 12px 10px 38px;
            border-radius: var(--r-md);
            font-family: var(--font-sans);
            font-size: var(--text-sm);
            transition: border-color var(--d-short) var(--ease-move);
        }

        .search-wrapper input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }

        .filter-controls {
            display: flex;
            align-items: center;
            gap: var(--s-md);
        }

        select {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            color: var(--ink);
            padding: 8px 12px;
            border-radius: var(--r-md);
            font-family: var(--font-sans);
            font-size: var(--text-sm);
            cursor: pointer;
        }

        /* Split Board Layout */
        .board-split {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--s-lg);
        }

        @media (min-width: 900px) {
            .board-split {
                grid-template-columns: 1fr 1fr;
                gap: var(--s-xl);
            }
        }

        .project-board-column {
            display: flex;
            flex-direction: column;
            gap: var(--s-lg);
            background: var(--paper-2);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: var(--s-md);
        }

        .project-board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: var(--s-md);
            margin-bottom: var(--s-2xs);
        }

        .project-title {
            display: flex;
            align-items: center;
            gap: var(--s-xs);
        }

        .project-title h2 {
            font-size: var(--text-xl);
            font-weight: 700;
            font-family: var(--font-sans);
            margin: 0;
        }

        .project-mini-stats {
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            color: var(--muted);
            display: flex;
            gap: var(--s-xs);
        }

        .mini-stat-item {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            padding: 2px 6px;
            border-radius: var(--r-sm);
        }

        .status-swimlane {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: var(--s-md);
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            gap: var(--s-xs);
        }

        .status-swimlane-header {
            font-family: var(--font-serif);
            font-size: var(--text-lg);
            border-bottom: 1px solid var(--border);
            padding-bottom: var(--s-2xs);
            margin: 0 0 var(--s-xs) 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-swimlane-count {
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            color: var(--muted);
            background: var(--paper-2);
            padding: 1px 6px;
            border-radius: var(--r-full);
        }

        .priority-subgroup {
            display: flex;
            flex-direction: column;
            gap: var(--s-2xs);
            margin-bottom: var(--s-xs);
        }

        .priority-subgroup-header {
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: var(--s-2xs);
            font-weight: 600;
        }

        .priority-subgroup-header::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
            opacity: 0.4;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: var(--s-xs);
        }

        .task-card {
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            padding: var(--s-sm);
            cursor: pointer;
            transition: all var(--d-short) var(--ease-move);
            display: flex;
            flex-direction: column;
            gap: var(--s-2xs);
        }

        .task-card:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-float);
            border-color: var(--primary);
            background: var(--surface-raised);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-id {
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            color: var(--muted);
        }

        .priority-badge {
            font-size: 10px;
            padding: 1px 4px;
            border-radius: var(--r-sm);
            font-weight: 700;
            text-transform: uppercase;
            font-family: var(--font-mono);
        }

        .p1 { background: var(--error); color: white; }
        .p2 { background: var(--warning); color: var(--ink); }
        .p3 { background: var(--primary); color: white; }
        .done { background: var(--success); color: white; }
        .in-progress-badge { background: var(--warning); color: var(--ink); }
        .planned-badge { background: var(--paper-2); border: 1px solid var(--border); color: var(--muted); }

        .task-title {
            font-weight: 600;
            font-size: var(--text-sm);
            color: var(--ink);
            line-height: var(--leading-snug);
        }

        /* Roadmap Layout Styles */
        .roadmap-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--s-lg);
        }

        @media (min-width: 900px) {
            .roadmap-layout {
                grid-template-columns: 1.2fr 1.8fr;
                gap: var(--s-xl);
            }
        }

        /* Vertical Timeline styling */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: var(--s-md);
            position: relative;
            padding-left: var(--s-lg);
            margin-top: var(--s-xs);
        }

        .timeline::before {
            content: "";
            position: absolute;
            left: 7px;
            top: 10px;
            bottom: 10px;
            width: 2px;
            background: var(--border);
        }

        .timeline-item {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: var(--s-2xs);
        }

        .timeline-dot {
            position: absolute;
            left: -21px;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--paper);
            border: 2px solid var(--muted);
        }

        .timeline-item.completed .timeline-dot {
            background: var(--success);
            border-color: var(--success);
        }

        .timeline-item.in-progress .timeline-dot {
            background: var(--warning);
            border-color: var(--warning);
            box-shadow: 0 0 0 4px rgba(201, 133, 18, 0.15);
        }

        .timeline-item.planned .timeline-dot {
            background: var(--paper-2);
            border-color: var(--border);
        }

        .timeline-title {
            font-weight: 600;
            font-size: var(--text-sm);
            display: flex;
            align-items: center;
            gap: var(--s-xs);
            color: var(--ink);
        }

        .timeline-details {
            font-size: var(--text-xs);
            color: var(--muted);
            line-height: var(--leading-body);
        }

        /* Component Health Card Grid */
        .components-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: var(--s-md);
            margin-top: var(--s-xs);
        }

        .component-card {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: var(--s-md);
            display: flex;
            flex-direction: column;
            gap: var(--s-2xs);
            box-shadow: var(--shadow-card);
        }

        .component-name {
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: var(--text-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--ink);
        }

        .component-details {
            font-size: var(--text-xs);
            color: var(--muted);
            line-height: var(--leading-body);
        }

        .component-status-bar {
            height: 4px;
            background: var(--paper-2);
            border-radius: var(--r-full);
            overflow: hidden;
            margin-top: var(--s-xs);
        }

        .component-status-fill {
            height: 100%;
        }

        .component-status-fill.completed {
            width: 100%;
            background: var(--success);
        }

        .component-status-fill.in-progress {
            width: 60%;
            background: var(--warning);
        }

        .component-status-fill.planned {
            width: 10%;
            background: var(--border);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal {
            background: var(--surface-raised);
            max-width: 600px;
            width: 90%;
            border-radius: var(--r-lg);
            padding: var(--s-lg);
            box-shadow: var(--shadow-float);
            border: 1px solid var(--border);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: var(--s-md);
            right: var(--s-md);
            cursor: pointer;
            color: var(--muted);
        }

        .modal-close:hover {
            color: var(--ink);
        }

        .modal h2 {
            margin-bottom: var(--s-md);
        }

        .modal-meta {
            display: flex;
            flex-wrap: wrap;
            gap: var(--s-sm);
            margin-bottom: var(--s-md);
            padding-bottom: var(--s-md);
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .modal-scope {
            white-space: pre-wrap;
            font-family: var(--font-sans);
            background: var(--paper);
            padding: var(--s-md);
            border-radius: var(--r-md);
            border: 1px solid var(--border);
            margin-top: var(--s-xs);
        }

        .copy-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .copy-task-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 4px;
            border-radius: var(--r-sm);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all var(--d-short) var(--ease-move);
        }

        .copy-task-btn:hover {
            color: var(--ink);
            background: var(--paper-2);
        }

        .copy-task-btn svg {
            width: 14px;
            height: 14px;
            display: block;
        }

        .copy-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translate(-50%, -4px) scale(0.95);
            background: var(--ink);
            color: var(--paper);
            font-size: 10px;
            font-family: var(--font-sans);
            font-weight: 600;
            padding: 3px 6px;
            border-radius: var(--r-sm);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all var(--d-short) var(--ease-move);
            box-shadow: var(--shadow-float);
            z-index: 10;
        }

        .copy-tooltip.show {
            opacity: 1;
            transform: translate(-50%, -4px) scale(1);
        }

        .theme-toggle {
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            background: var(--paper-2);
            border: 1px solid var(--border);
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--d-short) var(--ease-move);
        }

        .theme-toggle:hover {
            background: var(--border);
        }

        .icon-inline {
            width: 14px;
            height: 14px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title-area">
            <div class="eyebrow">Project Status Dashboard</div>
            <h1>llml Roadmap</h1>
        </div>
        <div style="display: flex; align-items: center; gap: var(--s-md);">
            <!-- View Selector Tabs -->
            <div class="view-selector">
                <button class="view-tab active" onclick="switchView('board')">
                    <i data-lucide="kanban-square" class="icon-inline"></i> Active Board
                </button>
                <button class="view-tab" onclick="switchView('roadmap')">
                    <i data-lucide="map" class="icon-inline"></i> Roadmap & Architecture
                </button>
            </div>
            <!-- Theme Toggle -->
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
                <i data-lucide="sun" id="theme-icon-light" style="display:none;"></i>
                <i data-lucide="moon" id="theme-icon-dark"></i>
            </button>
        </div>
    </header>

    <!-- VIEW 1: ACTIVE BOARD -->
    <div id="view-board" class="view-container">
        <div class="controls">
            <div class="search-wrapper">
                <i data-lucide="search" class="search-icon" style="width: 18px; height: 18px;"></i>
                <input type="text" id="search" placeholder="Search tasks..." oninput="renderTasks()">
            </div>
            
            <div class="filter-controls">
                <!-- Status Dropdown Filter -->
                <select id="filter-status" onchange="renderTasks()">
                    <option value="all">All Statuses</option>
                    <option value="in-progress">In Progress</option>
                    <option value="up-next">Up Next</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
        </div>

        <!-- Dual Column Split Layout -->
        <main class="board-split">
            <!-- Column 1: llml launcher -->
            <section class="project-board-column" id="board-llml">
                <div class="project-board-header">
                    <div class="project-title">
                        <i data-lucide="terminal" style="color: var(--primary);"></i>
                        <h2>llml</h2>
                    </div>
                    <div class="project-mini-stats" id="stats-llml">
                        <!-- Mini stats injected here -->
                    </div>
                </div>
                <div class="swimlanes-container" id="swimlanes-llml">
                    <!-- Status swimlanes injected here -->
                </div>
            </section>

            <!-- Column 2: llml-catalog site -->
            <section class="project-board-column" id="board-catalog">
                <div class="project-board-header">
                    <div class="project-title">
                        <i data-lucide="book-open" style="color: var(--primary);"></i>
                        <h2>llml-catalog</h2>
                    </div>
                    <div class="project-mini-stats" id="stats-catalog">
                        <!-- Mini stats injected here -->
                    </div>
                </div>
                <div class="swimlanes-container" id="swimlanes-catalog">
                    <!-- Status swimlanes injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- VIEW 2: ROADMAP & ARCHITECTURE -->
    <div id="view-roadmap" class="view-container" style="display: none;">
        <main class="roadmap-layout">
            <!-- Left panel: Suggested Build Order -->
            <section class="project-board-column" style="background: var(--surface-raised);">
                <div class="project-board-header">
                    <div class="project-title">
                        <i data-lucide="compass" style="color: var(--primary);"></i>
                        <h2>Suggested Build Order</h2>
                    </div>
                </div>
                <div class="timeline" id="timeline-container">
                    <!-- Timeline items injected here -->
                </div>
            </section>
            
            <!-- Right panel: Component Health -->
            <section class="project-board-column" style="background: var(--surface-raised);">
                <div class="project-board-header">
                    <div class="project-title">
                        <i data-lucide="layers" style="color: var(--primary);"></i>
                        <h2>Architecture & Component Health</h2>
                    </div>
                </div>
                <div class="components-grid" id="components-container">
                    <!-- Components injected here -->
                </div>
            </section>
        </main>
    </div>

    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" id="modal" onclick="event.stopPropagation()">
            <div class="modal-close" onclick="closeModal()">
                <i data-lucide="x" style="width: 20px; height: 20px;"></i>
            </div>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.439.0/dist/umd/lucide.min.js"></script>

        const buildSteps = [
            { step: 1, title: 'Catalog site polish', status: 'in-progress', details: '/how page, ImportModal 3-step flow, mobile breakpoints, keyboard shortcuts, loading states' },
            { step: 2, title: 'Launcher quality & robustness', status: 'planned', details: 'golangci-lint integration, missing-runtime and missing-model warnings' },
            { step: 3, title: 'SHA-256 verification', status: 'planned', details: '--expect-sha=<hex> to llml import for secure checksum pinning' },
            { step: 4, title: 'In-TUI catalog browser', status: 'planned', details: 'Search, preview, and import profiles natively in the terminal' },
            { step: 5, title: 'Profile-level runtime overrides', status: 'planned', details: 'Allow custom parameter overrides mapped to runtime targets' },
            { step: 6, title: 'Debug and introspection surface', status: 'planned', details: 'Expand LLML_DEBUG for clear model discovery diagnostics' },
            { step: 7, title: 'CLI for running profiles', status: 'planned', details: 'Execution framework to launch profile servers directly from shell' },
            { step: 8, title: 'MLX / mlx-lm integration', status: 'planned', details: 'Apple Silicon Apple-native LLM backends' },
            { step: 9, title: 'Windows WSL support', status: 'planned', details: 'Full cross-platform compatibility mapping' },
            { step: 10, title: 'LM Studio integration', status: 'planned', details: 'Ecosystem endpoint alignment' },
            { step: 11, title: 'LocalAI integration', status: 'planned', details: 'Local API endpoint backend coverage' }
        ];

        // Component Architecture states from PROJECT-STATUS.md
        const components = [
            { name: 'TUI launcher', status: 'completed', details: 'Discovered models, settings edit, launch preview, split log stream' },
            { name: 'Models & discovery', status: 'completed', details: 'Filesystem + Ollama scan, safetensors, GGUF profile mapping' },
            { name: 'Runtime integration', status: 'in-progress', details: 'llama.cpp, vLLM, Ollama, KoboldCpp. Warnings & new backends in progress' },
            { name: 'Config & user data', status: 'completed', details: 'config.toml persistence, environment variables, atomic backups' },
            { name: 'Parameter Profiles', status: 'completed', details: 'Named config profiles, cloning, CLI export/import framework' },
            { name: 'CLI & non-TUI workflows', status: 'in-progress', details: 'Import/export CLI complete; direct execution pathways planned' },
            { name: 'Agent-facing tooling', status: 'in-progress', details: 'Canonical import skills + sync scripts' },
            { name: 'Docs & packaging', status: 'completed', details: 'Homebrew, Scoop, Winget, GitHub Releases, TOML schemas' },
            { name: 'Shared profile catalog', status: 'completed', details: '59 profiles seeding, static Astro app, validation CI' }
        ];

        function switchView(viewName) {
            document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view-container').forEach(c => c.style.display = 'none');
            
            if (viewName === 'board') {
                document.querySelector('.view-tab[onclick*="board"]').classList.add('active');
                document.getElementById('view-board').style.display = 'block';
            } else {
                document.querySelector('.view-tab[onclick*="roadmap"]').classList.add('active');
                document.getElementById('view-roadmap').style.display = 'block';
                renderRoadmap();
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const lightIcon = document.getElementById('theme-icon-light');
            const darkIcon = document.getElementById('theme-icon-dark');
            if (theme === 'dark') {
                lightIcon.style.display = 'block';
                darkIcon.style.display = 'none';
            } else {
                lightIcon.style.display = 'none';
                darkIcon.style.display = 'block';
            }
        }

        function renderStats() {
            ['llml', 'llml-catalog'].forEach(repo => {
                const filtered = tasks.filter(t => t.repo === repo);
                const completed = filtered.filter(t => t.status === 'completed').length;
                const inProgress = filtered.filter(t => t.status === 'in-progress').length;
                const upNext = filtered.filter(t => t.status === 'up-next').length;
                
                const statsContainer = document.getElementById(`stats-${repo === 'llml' ? 'llml' : 'catalog'}`);
                statsContainer.innerHTML = `
                    <span class="mini-stat-item" style="color: var(--success);">${completed} done</span>
                    <span class="mini-stat-item" style="color: var(--primary);">${inProgress} active</span>
                    <span class="mini-stat-item" style="color: var(--warning);">${upNext} next</span>
                `;
            });
        }

        function renderTasks() {
            renderStats();

            const searchTerm = document.getElementById('search').value.toLowerCase();
            const statusFilter = document.getElementById('filter-status').value;

            const filterAndGroup = (repoName) => {
                const filtered = tasks.filter(t => {
                    const matchesSearch = t.title.toLowerCase().includes(searchTerm) || t.scope.toLowerCase().includes(searchTerm);
                    const matchesRepo = t.repo === repoName;
                    const matchesStatus = statusFilter === 'all' || t.status === statusFilter;
                    return matchesSearch && matchesRepo && matchesStatus;
                });

                const groups = {
                    'in-progress': { label: 'In Progress', tasks: [] },
                    'up-next': { label: 'Up Next', tasks: [] },
                    'completed': { label: 'Completed', tasks: [] }
                };

                filtered.forEach(t => {
                    if (groups[t.status]) groups[t.status].tasks.push(t);
                });

                return groups;
            };

            const renderRepoColumn = (repoName, containerId) => {
                const groups = filterAndGroup(repoName);
                const container = document.getElementById(containerId);

                let hasAnyTasks = false;
                const htmlContent = Object.entries(groups).map(([statusId, group]) => {
                    if (group.tasks.length === 0) return '';
                    hasAnyTasks = true;

                    const priorityOrder = ['P1', 'P2', 'P3', 'Done'];
                    const priorityGroups = {};
                    group.tasks.forEach(t => {
                        if (!priorityGroups[t.priority]) priorityGroups[t.priority] = [];
                        priorityGroups[t.priority].push(t);
                    });

                    const sortedPriorities = Object.keys(priorityGroups).sort((a, b) => {
                        return priorityOrder.indexOf(a) - priorityOrder.indexOf(b);
                    });

                    return `
                        <div class="status-swimlane">
                            <h3 class="status-swimlane-header">
                                ${group.label}
                                <span class="status-swimlane-count">${group.tasks.length}</span>
                            </h3>
                            <div class="swimlane-content">
                                ${sortedPriorities.map(p => `
                                    <div class="priority-subgroup">
                                        <div class="priority-subgroup-header">${p}</div>
                                        <div class="task-list">
                                            ${priorityGroups[p].map(t => `
                                                <div class="task-card" onclick="openModal('${t.id}')">
                                                    <div class="task-header">
                                                        <span class="task-id">#${t.id}</span>
                                                        <div style="display: flex; align-items: center; gap: var(--s-2xs);">
                                                            <div class="copy-wrapper">
                                                                <button class="copy-task-btn" onclick="copyTaskTitle(event, '${t.id}')" title="Copy task title">
                                                                    <i data-lucide="copy"></i>
                                                                </button>
                                                                <span class="copy-tooltip">Copied!</span>
                                                            </div>
                                                            <span class="priority-badge ${t.priority.toLowerCase()}">${t.priority}</span>
                                                        </div>
                                                    </div>
                                                    <div class="task-title">${t.title}</div>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }).join('');

                container.innerHTML = hasAnyTasks ? htmlContent : `<div style="text-align: center; color: var(--muted); padding: var(--s-lg); background: var(--surface-raised); border-radius: var(--r-md); border: 1px dashed var(--border);">No matching tasks.</div>`;
            };

            renderRepoColumn('llml', 'swimlanes-llml');
            renderRepoColumn('llml-catalog', 'swimlanes-catalog');

            if (window.lucide) {
                lucide.createIcons();
            }
        }

        function renderRoadmap() {
            const timelineContainer = document.getElementById('timeline-container');
            timelineContainer.innerHTML = buildSteps.map(step => `
                <div class="timeline-item ${step.status}">
                    <div class="timeline-dot"></div>
                    <div class="timeline-title">
                        <span>${step.step}. ${step.title}</span>
                        <span class="priority-badge ${step.status === 'in-progress' ? 'in-progress-badge' : 'planned-badge'}">
                            ${step.status.replace('-', ' ')}
                        </span>
                    </div>
                    <div class="timeline-details">${step.details}</div>
                </div>
            `).join('');

            const componentsContainer = document.getElementById('components-container');
            componentsContainer.innerHTML = components.map(c => `
                <div class="component-card">
                    <div class="component-name">
                        <span>${c.name}</span>
                        <span class="priority-badge ${c.status === 'completed' ? 'done' : 'in-progress-badge'}">
                            ${c.status}
                        </span>
                    </div>
                    <div class="component-details">${c.details}</div>
                    <div class="component-status-bar">
                        <div class="component-status-fill ${c.status}"></div>
                    </div>
                </div>
            `).join('');
        }

        function copyTaskTitle(event, taskId) {
            event.stopPropagation();
            const task = tasks.find(t => t.id == taskId);
            if (task) {
                const titleText = task.title;
                const btn = event.currentTarget;
                const tooltip = btn.nextElementSibling;
                
                const showSuccess = () => {
                    if (tooltip) {
                        tooltip.classList.add('show');
                        setTimeout(() => {
                            tooltip.classList.remove('show');
                        }, 1200);
                    }
                };

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(titleText).then(showSuccess);
                } else {
                    // Fallback for non-secure / file:// protocols
                    const textArea = document.createElement('textarea');
                    textArea.value = titleText;
                    textArea.style.position = 'fixed'; // Avoid scrolling to bottom
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        showSuccess();
                    } catch (err) {
                        console.error('Fallback copy failed', err);
                    }
                    document.body.removeChild(textArea);
                }
            }
        }

        function openModal(id) {
            const task = tasks.find(t => t.id == id);
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h2 style="font-family: var(--font-serif); font-size: var(--text-2xl); font-weight: 400; margin: 0 0 var(--s-sm) 0;">
                    ${task.title}
                </h2>
                <div class="modal-meta">
                    <span class="priority-badge ${task.priority.toLowerCase()}">${task.priority}</span>
                    <span class="task-repo">
                        <i data-lucide="${task.repo === 'llml' ? 'terminal' : 'book-open'}" class="icon-inline"></i>
                        ${task.repo}
                    </span>
                    <span class="task-status" style="font-family: var(--font-mono); font-size: var(--text-xs); color: var(--muted);">
                        ${task.status.replace('-', ' ')}
                    </span>
                </div>
                <div class="modal-scope">
                    <div class="eyebrow" style="margin-bottom: var(--s-2xs);">Scope & Details</div>
                    <div style="color: var(--ink); line-height: var(--leading-body); font-size: var(--text-sm); font-family: var(--font-mono);">${task.scope}</div>
                </div>
            `;
            document.getElementById('modal-overlay').style.display = 'flex';
            if (window.lucide) {
                lucide.createIcons();
            }
        }

        function closeModal(e) {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        // Initialize
        renderTasks();
        
        // Check system preference
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
            updateThemeIcon('dark');
        }
        
        if (window.lucide) {
            lucide.createIcons();
        }
    </script>
</body>
</html>
