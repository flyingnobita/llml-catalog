name: dev-docs submodule pins

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aligned:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch llml for pin comparison
        run: git clone --depth 1 https://github.com/flyingnobita/llml.git "${RUNNER_TEMP}/llml"

      - name: Check dev-docs pins match catalog and launcher
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          PIN_CATALOG=$(git rev-parse HEAD:dev-docs)
          PIN_LAUNCHER=$(git -C "${RUNNER_TEMP}/llml" rev-parse HEAD:dev-docs)
          if [ "$PIN_CATALOG" != "$PIN_LAUNCHER" ]; then
            echo "dev-docs pin mismatch:" >&2
            echo "  catalog:  $PIN_CATALOG" >&2
            echo "  launcher: $PIN_LAUNCHER" >&2
            echo "Fix: from llml-internal run: scripts/bump_parent_dev_docs_submodules.sh" >&2
            exit 1
          fi
          echo "dev-docs pins match: $PIN_CATALOG"
