name: Scrape Catalog

on:
  schedule:
    - cron: "37 8 * * 3"  # Wednesday 8:37 AM UTC (off-peak)
  workflow_dispatch:
    inputs:
      site:
        description: "Site ID from sites.toml (e.g. 'unsloth')"
        required: false
        default: ""
      single_url:
        description: "Single model page URL"
        required: false
        default: ""
      dry_run:
        description: "Dry run (no file writes)"
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install crawl4ai pydantic tomli tomli-w

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run scrape-catalog
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLML_EXTRACT_PROVIDER: ${{ vars.LLML_EXTRACT_PROVIDER || 'openai/gpt-4o' }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.single_url }}" ]; then
            ARGS="--single ${{ github.event.inputs.single_url }}"
          elif [ -n "${{ github.event.inputs.site }}" ]; then
            ARGS="--site ${{ github.event.inputs.site }}"
          else
            ARGS="--site unsloth"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/scrape_catalog.py $ARGS

      - name: Check for new profiles
        id: check
        run: |
          if [ -n "$(git ls-files --others --exclude-standard profiles/)" ] || \
             [ -n "$(git diff --name-only profiles/)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR with new profiles
        if: steps.check.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/scrape-catalog-${{ github.run_id }}
          commit-message: "profiles: auto-extract from scheduled crawl"
          title: "profiles: auto-extract from scheduled crawl"
          body: |
            Automated profile extraction from the crawl pipeline.

            **Source:** ${{ github.event.inputs.single_url || github.event.inputs.site || 'unsloth (scheduled)' }}

            Review checklist:
            - [ ] High-confidence profiles look correct
            - [ ] Medium-confidence `# REVIEW:` tags are resolved
            - [ ] No model-location parameters leaked through
            - [ ] TOML parses cleanly
