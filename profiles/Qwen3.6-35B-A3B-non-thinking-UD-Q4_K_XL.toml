schema_version = 3

[[profiles]]
name = "Qwen3.6-35B-A3B-non-thinking-UD-Q4_K_XL"
backend = "llama"
model_hint = "Qwen3.6-35B-A3B"
args = [ "--temp 0.7", "--top-p 0.8", "--top-k 20", "--presence-penalty 1.5", "--min-p 0.00", "--chat-template-kwargs {\"enable_thinking\":false}" ]
model_org = "unsloth"
profile_org = "unsloth"

[profiles.use_case]
primary = ["chat"]
tags = [ "non-thinking", "server" ]

[profiles.hardware]
class = "mixed"
min_vram_gb = 23
notes = "4-bit quant requires ~23 GB total memory (VRAM + RAM). For reasoning tasks use temp=1.0 and top-p=0.95."
