schema_version = 3

[[profiles]]
name = "Qwen3.6-thinking-coding"
backend = "llama"
model_hint = "Qwen3.6-35B-A3B"
args = [
  "--temp 0.6",
  "--top-p 0.95",
  "--ctx-size 16384",
  "--top-k 20",
  "--min-p 0.00",
  "--presence-penalty 0.0",
  "--repeat-penalty 1.0",
  "--chat-template-kwargs {\"enable_thinking\":true}",
]
model_org = "unsloth"
profile_org = "unsloth"

[profiles.use_case]
primary = ["general"]
tags = ["coding", "thinking"]

[profiles.hardware]
class = "mixed"
min_vram_gb = 23
notes = "4-bit quant requires ~23 GB total memory (VRAM + RAM). Tuned for precise coding with lower temperature and no presence penalty."
