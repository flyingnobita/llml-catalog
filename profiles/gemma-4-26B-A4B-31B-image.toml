schema_version = 3

[[profiles]]
name = "gemma-4-26B-A4B-31B-image"
backend = "llama"
model_hint = "gemma-4"
args = [
  "--temp 1.0",
  "--top-p 0.95",
  "--top-k 64",
  "--chat-template-kwargs {\"enable_thinking\":false}",
]
model_org = "unsloth"
profile_org = "unsloth"

[profiles.use_case]
primary = ["chat"]
tags = ["image", "coding", "tool-calling", "agentic"]

[profiles.hardware]
class = "mixed"
min_vram_gb = 16
notes = "26B-A4B: 16-18 GB (4-bit), 28-30 GB (8-bit), 52 GB (BF16/FP16). 31B: 17-20 GB (4-bit), 34-38 GB (8-bit), 62 GB (BF16/FP16). Requires mmproj BF16 file for vision; llama.cpp supports CPU and GPU inference"
