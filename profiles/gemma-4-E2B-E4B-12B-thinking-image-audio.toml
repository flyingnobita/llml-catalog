schema_version = 3

[[profiles]]
name = "gemma-4-E2B-E4B-12B-thinking-image-audio"
backend = "llama"
model_hint = "gemma-4"
args = [
  "--temp 1.0",
  "--top-p 0.95",
  "--top-k 64",
  "--chat-template-kwargs {\"enable_thinking\":true}",
]
model_org = "unsloth"
profile_org = "unsloth"

[profiles.use_case]
primary = ["general"]
tags = ["thinking", "image", "audio", "coding", "tool-calling", "agentic"]

[profiles.hardware]
class = "mixed"
min_vram_gb = 4
notes = "E2B: 4 GB (4-bit) or 5-8 GB (8-bit), phone/edge. E4B: 5.5-6 GB (4-bit) or 9-12 GB (8-bit), laptops. 12B Unified: 7-8 GB (4-bit), 13-14 GB (8-bit), 25 GB (BF16/FP16); text/image/audio. llama.cpp supports CPU and GPU inference"
