schema_version = 2

[[profiles]]
name = "Qwen3.5-9B-thinking-coding-UD-Q4_K_XL"
backend = "llama"
model_hint = "Qwen3.5-9B"
args = [ "--temp 0.6", "--top-p 0.95", "--top-k 20", "--min-p 0.00", "--chat-template-kwargs {\"enable_thinking\":true}" ]
model_org = "unsloth"
profile_org = "unsloth"

[profiles.use_case]
primary = "chat"
tags = [ "thinking", "coding", "server" ]

[profiles.hardware]
class = "mixed"
min_vram_gb = 7
notes = "4-bit UD-Q4_K_XL; ~6.5 GB total memory; thinking disabled by default on Small models, must enable explicitly"
