schema_version = 3

[[profiles]]
name = "Qwen3-Coder-Next-FP8-Dynamic"
backend = "vllm"
model_hint = "Qwen3-Coder-Next"
args = [ "--tensor-parallel-size 4", "--tool-call-parser qwen3_coder", "--enable-auto-tool-choice", "--dtype bfloat16", "--seed 3407", "--max-model-len 200000", "--gpu-memory-utilization 0.93" ]
model_org = "unsloth"
profile_org = "unsloth"

[profiles.use_case]
primary = ["general"]
tags = ["tool-calling", "coding", "agentic", "non-thinking", "moe", "fp8", "multi-gpu" ]

[profiles.hardware]
class = "gpu"
notes = "80B MoE (3B active); FP8-Dynamic quant served on 4 GPUs (CUDA_VISIBLE_DEVICES='0,1,2,3'); can use --kv-cache-dtype fp8 to halve KV cache memory; boosts throughput 25%+ vs BF16"
