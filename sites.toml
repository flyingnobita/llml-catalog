# Site configurations for the model card scraping pipeline.
# Each [site.<id>] entry defines crawl scope and extraction hints.

[site.unsloth]
base_url = "https://unsloth.ai/docs/models/"
url_pattern = "/docs/models/.+"
max_depth = 1
max_pages = 50
extraction_hints = """Unsloth "<Model> - How to Run Locally" pages. Page structure varies widely (flat headings vs numbered tutorial steps; single-variant vs multi-variant; thinking/non-thinking/neither). Anchor extraction on:
  - H1 supplies the ModelFamily.
  - The "Llama.cpp Guide" section (emoji prefix varies) and equivalent vLLM/Ollama sections contain the launch invocations.
  - Many code blocks are install/build/chat-template/multi-turn examples — only extract those that actually launch a backend with sampling flags (--temp, --top-p, --top-k, --min-p, --ctx-size, etc.).
  - Hardware requirements appear in nearby tables or prose; if only a range is given, fill min_vram_gb and max_vram_gb.
  - Variant identifier may be in a section heading, a comparison table, the GGUF filename, or the --model path. Omit the variant segment entirely when the page documents only one variant."""

